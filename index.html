<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcPortal | Arc Network Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #01010b; color: white; font-family: sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .arc-glow { border: 1px solid #00e5ff; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div class="mb-6 text-center">
        <h1 class="orbitron text-3xl font-bold text-cyan-400">ARC PORTAL</h1>
        <p class="text-[10px] tracking-widest text-gray-400">BUILDER: AMRISH KUMAR DWIVEDI</p>
    </div>

    <div class="arc-glow bg-white/5 p-6 rounded-2xl space-y-4">
        <div class="flex justify-between items-center">
            <span class="text-xs orbitron text-gray-400">NETWORK: ARC</span>
            <div id="statusDot" class="w-3 h-3 bg-red-500 rounded-full"></div>
        </div>
        
        <button onclick="connectArcWallet()" id="connectBtn" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-4 rounded-xl orbitron transition-all">
            CONNECT ARC WALLET
        </button>
        
        <p id="errorMsg" class="text-red-400 text-[10px] text-center italic"></p>
    </div>

    <div class="mt-6 arc-glow bg-white/5 p-6 rounded-2xl">
        <p class="text-[10px] orbitron text-gray-400">TOTAL ASSETS (ARC)</p>
        <h2 id="balanceDisplay" class="text-4xl font-bold mt-2 font-mono">0.00 ARC</h2>
        <p id="walletAddrDisplay" class="text-[10px] text-cyan-800 mt-2 break-all"></p>
    </div>

    <div class="mt-auto grid grid-cols-2 gap-4 pb-4">
        <button onclick="alert('Arc Send Coming Soon')" class="bg-white/10 py-4 rounded-xl text-xs orbitron border border-white/20">SEND ARC</button>
        <button onclick="alert('Arc Swap Coming Soon')" class="bg-white/10 py-4 rounded-xl text-xs orbitron border border-white/20">ARC SWAP</button>
    </div>

    <script>
        async function connectArcWallet() {
            const errorElement = document.getElementById('errorMsg');
            errorElement.innerText = "Connecting...";

            if (window.ethereum) {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    // Requesting account access
                    const accounts = await provider.send("eth_requestAccounts", []);
                    const address = accounts[0];

                    // Update UI
                    document.getElementById('walletAddrDisplay').innerText = address;
                    document.getElementById('statusDot').classList.replace('bg-red-500', 'bg-green-500');
                    document.getElementById('connectBtn').innerText = "CONNECTED";
                    document.getElementById('connectBtn').disabled = true;
                    errorElement.innerText = "";

                    // Fetch Balance
                    const balance = await provider.getBalance(address);
                    document.getElementById('balanceDisplay').innerText = parseFloat(ethers.utils.formatEther(balance)).toFixed(4) + " ARC";
                    
                } catch (err) {
                    errorElement.innerText = "Error: User Rejected or Connection Failed.";
                    console.error(err);
                }
            } else {
                errorElement.innerText = "Error: Mises Browser/Wallet not detected.";
            }
        }
    </script>
</body>
</html>
