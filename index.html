<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcPortal | NebuloSonic Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --arc-blue: #00e5ff; --arc-purple: #7000ff; --bg: #01010b; }
        body { background-color: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; min-height: 100vh; margin: 0; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Premium Banner */
        .banner {
            background: linear-gradient(to bottom, rgba(1,1,11,0.2), #01010b), 
                        url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?auto=format&fit=crop&w=1000&q=80');
            background-size: cover; height: 250px; position: relative; border-bottom: 2px solid var(--arc-blue);
        }

        /* Floating Logo from GitHub */
        .logo-container {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; text-align: center;
        }
        .main-logo {
            width: 100px; filter: drop-shadow(0 0 20px var(--arc-blue));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(-5px); } 50% { transform: translateY(5px); } }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 20px; }
        .btn-arc { background: linear-gradient(135deg, var(--arc-purple), var(--arc-blue)); color: black; font-weight: bold; transition: 0.3s; }
        .btn-arc:active { transform: scale(0.95); box-shadow: 0 0 20px var(--arc-blue); }
        
        .ticker-bar { background: black; border-bottom: 1px solid var(--arc-blue); overflow: hidden; white-space: nowrap; }
        .ticker-text { display: inline-block; animation: ticker 25s linear infinite; color: var(--arc-blue); font-family: 'Orbitron'; font-size: 10px; padding: 6px 0; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="ticker-bar">
        <div class="ticker-text">SECURE ACCESS GRANTED ● OPERATOR: AMRISH KUMAR DWIVEDI ● ARC NETWORK: ACTIVE ● NODE STATUS: OPTIMAL ● NEBULOSONIC PROTOCOL V2.0</div>
    </div>

    <div class="banner">
        <div class="logo-container">
            <img src="logo.png" alt="Arc Logo" class="main-logo" onerror="this.src='https://img.icons8.com/color/512/alpha.png'">
            <h1 class="orbitron text-2xl font-bold tracking-[0.4em] mt-4 text-white">ARCPORTAL</h1>
        </div>
    </div>

    <main class="p-6 space-y-5 max-w-md mx-auto">
        <div class="glass p-5">
            <div class="flex justify-between items-center mb-4">
                <span id="statusLabel" class="text-[10px] orbitron text-red-500">SYSTEM OFFLINE</span>
                <div id="statusDot" class="w-2 h-2 bg-red-500 rounded-full"></div>
            </div>
            <button onclick="connectWallet()" id="connBtn" class="w-full py-4 rounded-2xl btn-arc orbitron text-xs shadow-lg">
                INITIALIZE ARC CONNECTION
            </button>
            <p id="addrText" class="text-[9px] text-center text-cyan-800 mt-3 font-mono truncate"></p>
        </div>

        <div class="glass p-6">
            <p class="text-[10px] text-gray-400 orbitron">AVAILABLE ASSETS</p>
            <div class="flex items-baseline gap-2 mt-2">
                <span id="balDisplay" class="text-5xl font-bold font-mono text-white">0.00</span>
                <span class="text-sm font-bold text-cyan-400 orbitron">ARC</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openFeature('Send')" class="glass py-5 rounded-2xl text-[10px] orbitron font-bold border-cyan-500/30 hover:bg-cyan-500/10">SEND ASSETS</button>
            <button onclick="openFeature('Swap')" class="glass py-5 rounded-2xl text-[10px] orbitron font-bold border-cyan-500/30 hover:bg-cyan-500/10">SMART SWAP</button>
            <button onclick="openFeature('Bridge')" class="glass py-5 rounded-2xl text-[10px] orbitron font-bold border-cyan-500/30 hover:bg-cyan-500/10">ARC BRIDGE</button>
            <button onclick="openFeature('Agents')" class="glass py-5 rounded-2xl text-[10px] orbitron font-bold border-cyan-500/30 hover:bg-cyan-500/10">AGENT HUB</button>
        </div>
    </main>

    <footer class="p-6 text-center">
        <p class="text-[8px] text-cyan-900 orbitron tracking-widest">NEBULOSONIC SECURE TERMINAL | 2026</p>
    </footer>

    <script>
        function openFeature(name) {
            alert(name + " Interface is being initialized on Arc Network...");
        }

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    const balance = await provider.getBalance(accounts[0]);
                    
                    document.getElementById('addrText').innerText = accounts[0];
                    document.getElementById('balDisplay').innerText = parseFloat(ethers.utils.formatEther(balance)).toFixed(4);
                    
                    const btn = document.getElementById('connBtn');
                    btn.innerText = "SYSTEM CONNECTED";
                    btn.classList.replace('btn-arc', 'bg-cyan-900/20');
                    btn.style.color = "#00e5ff";
                    btn.style.border = "1px solid #00e5ff";
                    
                    document.getElementById('statusLabel').innerText = "SYSTEM ONLINE";
                    document.getElementById('statusLabel').classList.replace('text-red-500', 'text-green-500');
                    document.getElementById('statusDot').classList.replace('bg-red-500', 'bg-green-500');
                } catch (e) { alert("Access Denied by User"); }
            } else { alert("Please use Mises Browser with Arc-supported wallet!"); }
        }
    </script>
</body>
        </html>
