<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcPortal | NebuloSonic Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --arc-blue: #00e5ff; --arc-purple: #7000ff; --portal-bg: #01010b; }
        body { background-color: var(--portal-bg); color: white; font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* Vahi Subah wala Premium Banner */
        .portal-bg {
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.25) 0%, transparent 75%),
                        url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=1000&q=80');
            background-size: cover; height: 240px; position: relative; border-bottom: 2px solid var(--arc-blue);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.2);
        }

        .central-logo {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; z-index: 10; filter: drop-shadow(0 0 20px var(--arc-blue));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translate(-50%, -55%); } 50% { transform: translate(-50%, -45%); } }

        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 16px; }
        .btn-glow { background: linear-gradient(135deg, var(--arc-purple), var(--arc-blue)); color: black; font-weight: bold; }
        
        .ticker-wrap { background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid var(--arc-blue); overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="ticker-wrap text-[10px] orbitron text-cyan-400 py-2">
        <div class="ticker">
            CORE SYSTEM: ACTIVE ● ARC NETWORK STATUS: STABLE ● BUILDER: AMRISH KUMAR DWIVEDI ● NEBULOSONIC PROTOCOL ACTIVE...
        </div>
    </div>

    <div class="portal-bg">
        <img src="https://img.icons8.com/color/512/alpha.png" alt="Arc-A" class="central-logo">
        <div class="absolute bottom-4 w-full text-center">
            <h1 class="orbitron text-3xl font-bold tracking-[0.2em]">ARCPORTAL</h1>
            <p class="text-[9px] text-cyan-400 tracking-widest mt-1">NEBULOSONIC INTERFACE V2</p>
        </div>
    </div>

    <main class="p-4 space-y-4">
        <div class="glass-card p-4 flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div id="statusDot" class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                    <span id="walletAddress" class="text-[10px] font-mono text-cyan-300">DISCONNECTED</span>
                </div>
                <span class="text-[9px] orbitron bg-blue-900/50 px-2 py-1 rounded border border-blue-400">ARC NETWORK</span>
            </div>
            <button onclick="connectArc()" id="connectBtn" class="btn-glow py-3 rounded-xl orbitron text-xs">CONNECT ARC WALLET</button>
        </div>

        <div class="glass-card p-5">
            <span class="text-gray-400 text-[10px] orbitron uppercase text-xs">Total ARC Balance</span>
            <h2 id="balanceDisplay" class="text-4xl font-bold text-white orbitron mt-1">0.00</h2>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="alert('Sending ARC...')" class="glass-card py-5 font-bold orbitron text-[10px] hover:bg-cyan-500/10 transition">SEND ARC</button>
            <button onclick="alert('Swap Interface Loading...')" class="glass-card py-5 font-bold orbitron text-[10px] hover:bg-cyan-500/10 transition">SMART SWAP</button>
            <button onclick="alert('Bridge Initialized...')" class="glass-card py-5 font-bold orbitron text-[10px] hover:bg-cyan-500/10 transition">BRIDGE</button>
            <button onclick="alert('Agent Hub Active')" class="glass-card py-5 font-bold orbitron text-[10px] hover:bg-cyan-500/10 transition">AGENT HUB</button>
        </div>
    </main>

    <footer class="mt-auto p-4 text-center border-t border-cyan-900/30">
        <p class="text-[9px] text-cyan-900 orbitron">NEBULOSONIC SECURE TERMINAL | AMRISH KUMAR DWIVEDI</p>
    </footer>

    <script>
        async function connectArc() {
            if (window.ethereum) {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    const address = accounts[0];
                    const balance = await provider.getBalance(address);
                    
                    document.getElementById('walletAddress').innerText = address.substring(0,6) + "..." + address.substring(38);
                    document.getElementById('balanceDisplay').innerText = parseFloat(ethers.utils.formatEther(balance)).toFixed(4);
                    document.getElementById('statusDot').classList.replace('bg-red-500', 'bg-green-500');
                    document.getElementById('statusDot').classList.remove('animate-pulse');
                    document.getElementById('connectBtn').innerText = "SYSTEM CONNECTED";
                    document.getElementById('connectBtn').classList.replace('btn-glow', 'bg-cyan-900/20');
                    document.getElementById('connectBtn').style.color = "#00e5ff";
                } catch (e) { alert("Connection Error"); }
            } else { alert("Please use Mises Browser"); }
        }
    </script>
</body>
    </html>
