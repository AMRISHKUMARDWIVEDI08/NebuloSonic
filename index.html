<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcPortal V2 | Live Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --arc-blue: #00e5ff; --arc-purple: #7000ff; --portal-bg: #01010b; }
        body { background-color: var(--portal-bg); color: white; font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .portal-bg {
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.25) 0%, transparent 75%),
                        url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=1000&q=80');
            background-size: cover; height: 260px; position: relative; border-bottom: 2px solid var(--arc-blue);
        }
        .central-logo {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; z-index: 10; filter: drop-shadow(0 0 20px var(--arc-blue));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translate(-50%, -55%); } 50% { transform: translate(-50%, -45%); } }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 16px; }
        .glow-button { background: linear-gradient(135deg, var(--arc-purple), var(--arc-blue)); box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3); }
        .ticker-wrap { background: rgba(0, 0, 0, 0.8); border-bottom: 1px solid var(--arc-blue); overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="ticker-wrap text-[10px] orbitron text-cyan-400 py-2">
        <div class="ticker">
            CORE SYSTEM: ACTIVE ● NODE STATUS: STABLE ● ARC NETWORK TPS: 14,200 ● BUILDER: AMRISH KUMAR DWIVEDI CONNECTED...
        </div>
    </div>

    <div class="portal-bg">
        <img src="https://img.icons8.com/color/512/alpha.png" alt="Arc-A" class="central-logo">
        <div class="absolute bottom-6 w-full text-center">
            <h1 class="orbitron text-3xl font-bold tracking-[0.2em]">ARCPORTAL</h1>
            <p class="text-[9px] text-cyan-400 tracking-widest mt-1 text-uppercase">NEBULOSONIC COMMAND CENTER</p>
        </div>
    </div>

    <main class="p-4 space-y-4">
        <div class="flex justify-between items-center glass-card p-3">
            <button onclick="connectWallet()" id="connectBtn" class="flex items-center gap-2">
                <div id="statusDot" class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                <span id="walletAddress" class="text-xs font-mono text-cyan-300 uppercase">Connect Wallet</span>
            </button>
            <span class="bg-blue-900 text-[9px] px-2 py-1 rounded border border-blue-400 orbitron uppercase">Verified Builder</span>
        </div>

        <div class="glass-card p-5">
            <span class="text-gray-400 text-[10px] orbitron">PORTFOLIO VALUE</span>
            <h2 id="balanceDisplay" class="text-3xl font-bold text-white orbitron mt-1">$0.00</h2>
            <div class="mt-4 flex flex-col gap-2">
                <div class="flex justify-between text-[11px] border-b border-white/10 pb-1">
                    <span>ARC TOKEN</span> <span class="text-cyan-400">1,250.00</span>
                </div>
                <div class="flex justify-between text-[11px] border-b border-white/10 pb-1">
                    <span>USDC</span> <span class="text-cyan-400">450.00</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="playAction('SEND')" class="glow-button py-4 rounded-xl font-bold orbitron text-[11px]">SEND</button>
            <button onclick="playAction('SWAP')" class="glow-button py-4 rounded-xl font-bold orbitron text-[11px]">SMART SWAP</button>
            <button onclick="playAction('BRIDGE')" class="glow-button py-4 rounded-xl font-bold orbitron text-[11px]">BRIDGE</button>
            <button onclick="playAction('AGENTS')" class="glow-button py-4 rounded-xl font-bold orbitron text-[11px]">AGENT HUB</button>
        </div>
    </main>

    <footer class="mt-auto p-6 text-center border-t border-cyan-900/30">
        <p class="text-[9px] text-cyan-800 orbitron">ARCPORTAL BY AMRISH KUMAR DWIVEDI | 2026</p>
    </footer>

    <script>
        function playAction(type) {
            new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3').play();
            alert(type + " System Ready on Arc Testnet!");
        }

        async function connectWallet() {
            if (window.ethereum) {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                document.getElementById('walletAddress').innerText = accounts[0].substring(0,6) + "..." + accounts[0].substring(38);
                document.getElementById('statusDot').classList.replace('bg-red-500', 'bg-green-500');
                const balance = await provider.getBalance(accounts[0]);
                document.getElementById('balanceDisplay').innerText = parseFloat(ethers.utils.formatEther(balance)).toFixed(4) + " ETH";
            } else { alert("Please use Mises Browser!"); }
        }
    </script>
</body>
</html>
